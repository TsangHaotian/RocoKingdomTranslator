<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国语翻译器</title>
    <style>
        @font-face {
            font-family: 'Rune';
            src: url('https://raw.githubusercontent.com/TsangHaotian/RocoKingdomTranslator/main/font/RUNEREGULAR.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: #ffd700;
            text-decoration: none;
            font-size: 0.9em;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .translator-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 280px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.1em;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #ffd700;
        }

        .output-box {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            text-align: center;
            font-size: 2em;
            cursor: pointer;
            user-select: text;
            -webkit-user-select: text;
        }

        .output-box.rune-text {
            font-family: 'Rune', sans-serif;
            letter-spacing: 5px;
        }

        .output-box.eng-text {
            font-size: 1.3em;
        }

        .output-box:hover {
            border-color: #ffd700;
        }

        .output-box.rune-output-box {
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 3px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9em;
        }

        .footer a {
            color: #ffd700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .keyboard-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 15px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key-btn {
            font-size: 1.2em;
            width: 42px;
            height: 46px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .key-btn:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .key-btn.space {
            width: 160px;
            font-size: 0.9em;
        }

        .key-btn.key-delete {
            width: 60px;
            background: rgba(255,100,100,0.2);
            border-color: rgba(255,100,100,0.4);
        }

        .editable-box {
            cursor: text;
            min-height: 100px;
            max-height: 150px;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 3px;
            user-select: text;
            -webkit-user-select: text;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            display: block;
        }

        .editable-box:empty::before {
            content: '点击此处或使用下方键盘输入';
            color: #666;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5em;
            }

            .section {
                padding: 15px;
            }

            .translator-box {
                flex-direction: column;
                gap: 10px;
            }

            .input-group {
                min-width: 100%;
            }

            textarea {
                height: 80px;
            }

            .output-box {
                font-size: 1.5em;
                min-height: 80px;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                width: 100%;
            }

            .keyboard-row {
                gap: 3px;
            }

            .key-btn {
                font-size: 0.9em;
                width: 26px;
                height: 38px;
            }

            .key-btn.space {
                width: 100px;
                font-size: 0.8em;
            }

            .key-btn.key-delete {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>

        <h1>洛克王国语翻译器</h1>
        <p style="text-align:center;color:#aaa;margin-bottom:20px;">近似字符版（可复制传播）</p>

        <!-- 英文 → 洛克语 -->
        <div class="section">
            <h2>英文 → 洛克王国语</h2>
            <div class="translator-box">
                <div class="input-group">
                    <label>输入英文：</label>
                    <textarea id="engInput" placeholder="输入英文文字..." oninput="engToRune()"></textarea>
                </div>
                <div class="input-group">
                    <label>洛克王国语（点击复制）：</label>
                    <div class="output-box rune-output-box" id="runeOutput" onclick="copyRune()">在此显示翻译结果</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-primary" onclick="copyRune()">复制洛克语</button>
                <button class="btn-secondary" onclick="clearEng()">清空</button>
            </div>
        </div>

        <!-- 洛克语 → 英文 -->
        <div class="section">
            <h2>洛克王国语 → 英文</h2>
            <div class="translator-box">
                <div class="input-group">
                    <label>输入洛克王国语（点击下方键盘输入）：</label>
                    <div class="output-box editable-box" id="runeInput" contenteditable="true" inputmode="none"></div>
                </div>
                <div class="input-group">
                    <label>翻译结果（英文）：</label>
                    <div class="output-box eng-text" id="engOutput">在此显示翻译结果</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-primary" onclick="copyEng()">复制英文</button>
                <button class="btn-secondary" onclick="clearRune()">清空</button>
            </div>
        </div>

        <!-- 虚拟键盘 -->
        <div class="section">
            <h2>洛克王国语虚拟键盘</h2>
            <p class="helper-text" style="color:#888;font-size:0.85em;">点击字符输入到上方洛克语输入框</p>
            <div class="keyboard-grid" id="keyboard"></div>
        </div>

        <div class="footer">
            <p>作者：<a href="https://github.com/TsangHaotian" target="_blank">TsangHaotian</a></p>
            <p>仓库：<a href="https://github.com/TsangHaotian/RocoKingdomTranslator" target="_blank">RocoKingdomTranslator</a></p>
        </div>
    </div>

    <script>
        // 自定义洛克王国语字符映射 (英语 → 洛克语)
        const ENG_TO_RUNE = {
            'A': 'ᚨ',
            'B': 'ᛒ',
            'C': '<',
            'D': 'ᛞ',
            'E': '𐊿',
            'F': 'ᚠ',
            'G': '𑁛',
            'H': 'h',
            'I': '|',
            'J': '𖨠',
            'K': '<',
            'L': '𐊓',
            'M': 'ϖ',
            'N': '𐨠',
            'O': 'ő',
            'P': 'Ͼ',
            'Q': 'Ⱒ',
            'R': 'ᚱ',
            'S': '𐌔',
            'T': 'ᛏ',
            'U': '𖥵',
            'V': 'ᚹ',
            'W': 'ᚹ',
            'X': '𐰷',
            'Y': 'ᴎ',
            'Z': 'ᛉ'
        };

        // 构建反向映射 (洛克语 → 英语)
        const RUNE_TO_ENG = {};
        for (const [eng, rune] of Object.entries(ENG_TO_RUNE)) {
            RUNE_TO_ENG[rune] = eng;
        }

        // 获取所有洛克语字符（按键盘顺序排列）
        const QWERTY_LAYOUT = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
        ];

        // 英文 → 洛克语
        function engToRune() {
            const input = document.getElementById('engInput').value.toUpperCase();
            let result = '';
            for (const char of input) {
                if (ENG_TO_RUNE[char]) {
                    result += ENG_TO_RUNE[char];
                } else if (char === ' ') {
                    result += ' ';
                } else {
                    result += char;
                }
            }
            document.getElementById('runeOutput').textContent = result || '在此显示翻译结果';
        }

        // 洛克语 → 英文
        function runeToEng() {
            const input = document.getElementById('runeInput').textContent;
            let result = '';
            for (const char of input) {
                if (char === ' ') {
                    result += ' ';
                } else if (RUNE_TO_ENG[char]) {
                    result += RUNE_TO_ENG[char];
                } else {
                    result += char;
                }
            }
            document.getElementById('engOutput').textContent = result || '在此显示翻译结果';
        }

        // 渲染虚拟键盘
        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';

            QWERTY_LAYOUT.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';

                row.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key-btn';
                    btn.textContent = ENG_TO_RUNE[key] || key;
                    btn.dataset.key = key;

                    btn.onclick = (e) => {
                        e.preventDefault();
                        const input = document.getElementById('runeInput');
                        input.textContent += btn.textContent;
                        runeToEng();
                    };

                    rowDiv.appendChild(btn);
                });

                container.appendChild(rowDiv);
            });

            // 空格 + 删除键
            const bottomRow = document.createElement('div');
            bottomRow.className = 'keyboard-row';

            const spaceBtn = document.createElement('button');
            spaceBtn.className = 'key-btn space';
            spaceBtn.textContent = '空格';
            spaceBtn.onclick = (e) => {
                e.preventDefault();
                const input = document.getElementById('runeInput');
                input.textContent += ' ';
                runeToEng();
            };
            bottomRow.appendChild(spaceBtn);

            const delBtn = document.createElement('button');
            delBtn.className = 'key-btn key-delete';
            delBtn.textContent = '⌫';
            delBtn.onclick = (e) => {
                e.preventDefault();
                const input = document.getElementById('runeInput');
                const text = input.textContent;
                input.textContent = text.slice(0, -1);
                runeToEng();
            };
            bottomRow.appendChild(delBtn);

            container.appendChild(bottomRow);
        }

        // 复制
        function copyRune() {
            const text = document.getElementById('runeOutput').textContent;
            if (text && text !== '在此显示翻译结果') {
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
            }
        }

        function copyEng() {
            const text = document.getElementById('engOutput').textContent;
            if (text && text !== '在此显示翻译结果') {
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
            }
        }

        // 清空
        function clearEng() {
            document.getElementById('engInput').value = '';
            document.getElementById('runeOutput').textContent = '在此显示翻译结果';
        }

        function clearRune() {
            document.getElementById('runeInput').textContent = '';
            document.getElementById('engOutput').textContent = '在此显示翻译结果';
        }

        // 监听洛克语输入框变化
        document.getElementById('runeInput').addEventListener('input', runeToEng);

        // 初始化
        renderKeyboard();
    </script>
</body>
</html>
